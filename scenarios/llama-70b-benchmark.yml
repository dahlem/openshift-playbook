---
# Benchmark scenario: Meta-Llama-3.1-70B-Instruct FP8 on 4× L40S
#
# BigCodeBench: ~15,000 completions with 16k context
#   - 70B FP8 fits in ~35GB VRAM per GPU
#   - 4× L40S (48GB each) → plenty of headroom for KV cache
#
# Usage:
#   ansible-playbook playbooks/llm-endpoint.yml -e @scenarios/llama-70b-benchmark.yml

# Model
model_name: llama-3-70b
model_storage_uri: "hf://RedHatAI/Meta-Llama-3.1-70B-Instruct-FP8"
model_namespace: llama-3-70b

# Infrastructure — 4× L40S nodes
gpu_pool_name: gpu-llama
gpu_instance_type: g6e.2xlarge
gpu_pool_min_replicas: 4
gpu_pool_max_replicas: 4

# vLLM — optimized for batched throughput with 16k context
vllm_max_model_len: 16384
vllm_gpu_memory_utilization: "0.95"
vllm_extra_args:
  - --enable-chunked-prefill
  - --max-num-batched-tokens=4096

# Knative — all pods always running, higher concurrency target
knative_concurrency_target: "30"
