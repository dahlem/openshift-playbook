---
# Full-precision Mistral-Small-24B on L40S (g6e.2xlarge)
# Better quality, ~3x faster than L4.

# Model
model_name: mistral-small-24b
model_storage_uri: "hf://mistralai/Mistral-Small-24B-Instruct-2501"

# Infrastructure
gpu_instance_type: g6e.2xlarge
gpu_pool_min_replicas: 1
gpu_pool_max_replicas: 4

# vLLM — full precision fits in 48GB L40S VRAM
vllm_max_model_len: 8192
vllm_gpu_memory_utilization: "0.9"
