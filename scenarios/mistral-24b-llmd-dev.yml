---
# Minimal llm-d dev scenario: 1 prefill + 1 decode on L4.
#
# Usage:
#   ansible-playbook playbooks/llm-endpoint-llmd.yml -e @scenarios/mistral-24b-llmd-dev.yml

# Model
model_name: mistral-small-24b
model_storage_uri: "hf://RedHatAI/Mistral-Small-24B-Instruct-2501-quantized.w4a16"

# Both pools use the same instance type but separate machinepools
prefill_pool_name: gpu-prefill
prefill_instance_type: g6.xlarge
prefill_min_replicas: 1
prefill_max_replicas: 1
prefill_replicas: 1
prefill_tensor_parallel_size: 1

decode_pool_name: gpu-decode
decode_instance_type: g6.xlarge
decode_min_replicas: 1
decode_max_replicas: 2
decode_replicas: 1
decode_tensor_parallel_size: 1

vllm_max_model_len: 4096
