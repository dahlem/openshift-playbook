---
# Pre: cluster ready, oc logged in, GPU instance type available

- name: Load version constraints
  ansible.builtin.include_vars:
    file: "{{ versions_file }}"
    name: versions
  when: versions is not defined

- name: Resolve GPU instance type
  ansible.builtin.set_fact:
    _gpu_instance_type: "{{ gpu_instance_type | default(versions.infrastructure.gpu_instance_type) }}"

- name: Determine if nodes are expected at rest
  ansible.builtin.set_fact:
    _expect_nodes: >-
      {{ not (gpu_pool_autoscaling | default(true) | bool)
         or (gpu_pool_min_replicas | default(0) | int) > 0 }}

- name: Verify cluster is ready
  ansible.builtin.command:
    cmd: rosa describe cluster --cluster={{ rosa_cluster_name }} -o json
  register: _cluster_info
  changed_when: false

- name: Assert cluster is ready
  ansible.builtin.assert:
    that: (_cluster_info.stdout | from_json).status.state == 'ready'
    fail_msg: "Cluster {{ rosa_cluster_name }} is not ready. Run the rosa_cluster step first."

- name: Verify oc login
  ansible.builtin.command: oc whoami
  register: _oc_whoami
  changed_when: false
  failed_when: false

- name: Assert oc is logged in
  ansible.builtin.assert:
    that: _oc_whoami.rc == 0
    fail_msg: "Not logged in via oc. Run: oc login ..."

- name: Resolve subnet availability zone
  ansible.builtin.command: >-
    aws ec2 describe-subnets
    --subnet-ids {{ rosa_private_subnet }}
    --query 'Subnets[0].AvailabilityZone' --output text
    --region {{ aws_region }}
  register: _subnet_az
  changed_when: false

- name: Verify GPU instance type available in subnet AZ
  ansible.builtin.command: >-
    aws ec2 describe-instance-type-offerings
    --location-type availability-zone
    --filters Name=instance-type,Values={{ _gpu_instance_type }} Name=location,Values={{ _subnet_az.stdout }}
    --query 'InstanceTypeOfferings[*].Location' --output json
    --region {{ aws_region }}
  register: _az_check
  changed_when: false

- name: Assert GPU type available in subnet AZ
  ansible.builtin.assert:
    that: (_az_check.stdout | from_json | length) > 0
    fail_msg: >-
      {{ _gpu_instance_type }} is not available in {{ _subnet_az.stdout }}
      (subnet {{ rosa_private_subnet }}).
      Available AZs: check with
      aws ec2 describe-instance-type-offerings --location-type availability-zone
      --filters Name=instance-type,Values={{ _gpu_instance_type }} --region {{ aws_region }}
      --query 'InstanceTypeOfferings[*].Location' --output text

- name: Resolve instance vCPU count
  ansible.builtin.command: >-
    aws ec2 describe-instance-types
    --instance-types {{ _gpu_instance_type }}
    --query 'InstanceTypes[0].VCpuInfo.DefaultVCpus' --output text
    --region {{ aws_region }}
  register: _instance_vcpus
  changed_when: false

- name: Resolve quota code for instance family
  ansible.builtin.set_fact:
    _quota_code: >-
      {{ 'L-DB2E81BA' if _gpu_instance_type.startswith('g')
         else 'L-417A185B' if _gpu_instance_type.startswith('p')
         else '' }}
    _quota_family: >-
      {{ 'G and VT' if _gpu_instance_type.startswith('g')
         else 'P' if _gpu_instance_type.startswith('p')
         else 'unknown' }}

- name: Get vCPU quota for instance family
  ansible.builtin.command: >-
    aws service-quotas get-service-quota
    --service-code ec2
    --quota-code {{ _quota_code }}
    --query 'Quota.Value' --output text
    --region {{ aws_region }}
  register: _vcpu_quota
  changed_when: false
  when: _quota_code | trim | length > 0

- name: Calculate vCPU requirements
  ansible.builtin.set_fact:
    _vcpus_per_node: "{{ _instance_vcpus.stdout | int }}"
    _vcpus_needed: "{{ (_instance_vcpus.stdout | int) * (gpu_pool_max_replicas | default(4) | int) }}"
    _vcpu_limit: "{{ _vcpu_quota.stdout | default('0') | float | int }}"
  when: _quota_code | trim | length > 0

- name: Count in-use vCPUs for instance family
  ansible.builtin.command: >-
    aws ec2 describe-instances
    --filters "Name=instance-state-name,Values=running,pending"
    --query 'Reservations[].Instances[?starts_with(InstanceType, `{{ _gpu_instance_type[0] }}`)]
      | [].VCpuInfo.CurrentVCpus' --output json
    --region {{ aws_region }}
  register: _vcpus_in_use_raw
  changed_when: false
  when: _quota_code | trim | length > 0

- name: Calculate available vCPUs
  ansible.builtin.set_fact:
    _vcpus_in_use: "{{ (_vcpus_in_use_raw.stdout | from_json | sum) | default(0) | int }}"
    _vcpus_available: "{{ (_vcpu_limit | int) - ((_vcpus_in_use_raw.stdout | from_json | sum) | default(0) | int) }}"
  when: _quota_code | trim | length > 0

- name: Assert sufficient vCPU quota
  ansible.builtin.assert:
    that: (_vcpus_available | int) >= (_vcpus_needed | int)
    fail_msg: |
      Insufficient vCPU quota for {{ _gpu_instance_type }} in {{ aws_region }}.

      Quota ({{ _quota_family }} On-Demand): {{ _vcpu_limit }} vCPUs
      In use: {{ _vcpus_in_use }} vCPUs
      Available: {{ _vcpus_available }} vCPUs
      Needed for {{ gpu_pool_max_replicas | default(4) }} × {{ _gpu_instance_type }}: {{ _vcpus_needed }} vCPUs ({{ _vcpus_per_node }} vCPUs each)

      Request an increase:
        aws service-quotas request-service-quota-increase \
          --service-code ec2 --quota-code {{ _quota_code }} \
          --desired-value {{ (_vcpus_needed | int) + (_vcpus_in_use | int) }} \
          --region {{ aws_region }}
  when: _quota_code | trim | length > 0

- name: Count subnet tags
  ansible.builtin.command: >-
    aws ec2 describe-tags
    --filters "Name=resource-id,Values={{ rosa_private_subnet }}"
    --query 'Tags | length(@)' --region {{ aws_region }}
  register: _tag_count
  changed_when: false

- name: Assert subnet tag headroom
  ansible.builtin.assert:
    that: (50 - _tag_count.stdout | int) >= (versions.infrastructure.min_subnet_tag_headroom | int)
    fail_msg: >-
      Subnet {{ rosa_private_subnet }} has {{ _tag_count.stdout }}/50 tags.
      Need {{ versions.infrastructure.min_subnet_tag_headroom }} free for a new machine pool.
      Clean up stale tags: aws ec2 delete-tags --resources {{ rosa_private_subnet }} --tags Key=<stale-key>

# Verify OCM roles before attempting machine pool creation
- name: Parse subscription ID from cluster info
  ansible.builtin.set_fact:
    _subscription_id: "{{ (_cluster_info.stdout | from_json).subscription.id }}"

- name: Get subscription role bindings for MachinePoolEditor check
  ansible.builtin.command:
    cmd: >-
      ocm get /api/accounts_mgmt/{{ versions.ocm.api.accounts_mgmt.version }}/subscriptions/{{ _subscription_id }}/role_bindings
  register: _mp_role_check
  changed_when: false
  failed_when: false

- name: Verify MachinePoolEditor role exists
  ansible.builtin.assert:
    that: >-
      (_mp_role_check.stdout | from_json)['items'] | default([])
        | selectattr(versions.ocm.api.accounts_mgmt.fields.role_id, 'equalto', versions.ocm.subscription_roles.machine_pool_editor)
        | list | length > 0
    fail_msg: >-
      {{ versions.ocm.subscription_roles.machine_pool_editor }} role not found for subscription {{ _subscription_id }}.
      Run: ansible-playbook playbooks/step-cluster-access.yml
  when: _mp_role_check.rc == 0

- name: Check if GPU machine pool already exists
  ansible.builtin.command:
    cmd: rosa describe machinepool {{ gpu_pool_name }} --cluster={{ rosa_cluster_name }} -o json
  register: _pre_pool_check
  changed_when: false
  failed_when: false

- name: Check if GPU node is already Ready
  kubernetes.core.k8s_info:
    kind: Node
    label_selectors:
      - "node.kubernetes.io/instance-type={{ _gpu_instance_type }}"
  register: _pre_gpu_nodes
  when:
    - _pre_pool_check.rc == 0
    - _expect_nodes | bool

- name: Determine if deploy is needed
  ansible.builtin.set_fact:
    _deploy_needed: "{{ _pre_pool_check.rc != 0 }}"
  when: not (_expect_nodes | bool)

- name: Determine if deploy is needed (nodes expected)
  ansible.builtin.set_fact:
    _deploy_needed: >-
      {{ not (
        _pre_pool_check.rc == 0 and
        _pre_gpu_nodes.resources | default([]) | length > 0 and
        (_pre_gpu_nodes.resources | default([]) | json_query('[?status.conditions[?type==`Ready` && status==`True`]]') | length > 0)
      ) }}
  when: _expect_nodes | bool

- name: "gpu_machinepool: already complete, skipping deploy."
  ansible.builtin.debug:
    msg: "gpu_machinepool: already complete, skipping deploy."
  when: not (_deploy_needed | bool)

- name: "gpu_machinepool preconditions: PASSED"
  ansible.builtin.debug:
    msg: "Cluster ready, oc logged in, {{ _gpu_instance_type }} available."
  when: _deploy_needed | bool
