---
- name: "gpu_machinepool: check preconditions"
  ansible.builtin.include_tasks: preconditions.yml

- name: "gpu_machinepool: deploy and verify"
  when: _deploy_needed | default(true)
  block:
    - name: "gpu_machinepool: deploy"
      ansible.builtin.include_tasks: deploy.yml

    - name: "gpu_machinepool: check postconditions"
      ansible.builtin.include_tasks: postconditions.yml

  rescue:
    - name: Get pool status before cleanup
      ansible.builtin.command:
        cmd: rosa describe machinepool {{ gpu_pool_name }} --cluster={{ rosa_cluster_name }} -o json
      register: _failed_pool
      changed_when: false
      failed_when: false

    - name: Parse failure details
      ansible.builtin.set_fact:
        _pool_status_msg: "{{ (_failed_pool.stdout | default('{}') | from_json).status.message | default('unknown') }}"
        _pool_replicas: "{{ (_failed_pool.stdout | default('{}') | from_json).status.current_replicas | default('unknown') }}"
        _pool_az: "{{ (_failed_pool.stdout | default('{}') | from_json).availability_zone | default('unknown') }}"
      when: _failed_pool.rc == 0

    - name: "gpu_machinepool: deploy FAILED — cleaning up broken pool"
      ansible.builtin.debug:
        msg: >-
          GPU machine pool '{{ gpu_pool_name }}' failed. Cleaning up so the next run starts fresh.

    - name: Delete failed machine pool
      ansible.builtin.command:
        cmd: rosa delete machinepool {{ gpu_pool_name }} --cluster={{ rosa_cluster_name }} --yes
      failed_when: false

    - name: Wait for deletion to complete
      ansible.builtin.command:
        cmd: rosa describe machinepool {{ gpu_pool_name }} --cluster={{ rosa_cluster_name }}
      register: _cleanup_check
      changed_when: false
      failed_when: false
      until: _cleanup_check.rc != 0
      retries: 20
      delay: 15

    - name: Fail — provisioning error
      ansible.builtin.fail:
        msg: |
          GPU machine pool '{{ gpu_pool_name }}' ({{ _gpu_instance_type }}) failed to provision.
          The broken pool has been cleaned up automatically.

          Status: {{ _pool_status_msg | default('unknown') }}
          AZ: {{ _pool_az | default('unknown') }}, Replicas: {{ _pool_replicas | default('unknown') }}

          Likely causes:
            - AWS capacity: {{ _gpu_instance_type }} not available in {{ _pool_az | default(aws_region) }}
            - Insufficient vCPU quota for {{ _gpu_instance_type }}
            - IAM permissions missing for machine pool creation

          Diagnose:
            # Check AZ availability
            aws ec2 describe-instance-type-offerings --location-type availability-zone \
              --filters Name=instance-type,Values={{ _gpu_instance_type }} --region {{ aws_region }} \
              --query 'InstanceTypeOfferings[*].Location' --output text

            # Check vCPU quota
            aws service-quotas get-service-quota --service-code ec2 \
              --quota-code L-DB2E81BA --query 'Quota.Value' --region {{ aws_region }}

            # Check running G-type instances consuming quota
            aws ec2 describe-instances --filters 'Name=instance-state-name,Values=running' \
              --query 'Reservations[].Instances[?starts_with(InstanceType,`g`)].{Type:InstanceType}' \
              --output table --region {{ aws_region }}

          Options:
            1. Re-run to retry (transient capacity issues may resolve)
            2. Use a different instance type: -e gpu_instance_type=g6e.2xlarge
            3. Use a different AZ (requires a subnet in that AZ)

- name: "gpu_machinepool: check postconditions"
  ansible.builtin.include_tasks: postconditions.yml
  when: not (_deploy_needed | default(true))
