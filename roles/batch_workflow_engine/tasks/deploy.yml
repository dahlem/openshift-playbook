---
- name: Create Argo Workflows operator Subscription
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: argo-workflows-operator
        namespace: openshift-operators
      spec:
        channel: "{{ batch_workflow_operator_channel }}"
        name: argo-workflows-operator
        source: community-operators
        sourceNamespace: openshift-marketplace

- name: Wait for Workflow CRD to appear
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: workflows.argoproj.io
  register: _workflow_crd
  until: _workflow_crd.resources | length > 0
  retries: "{{ (crd_wait_timeout | int / 10) | int }}"
  delay: 10
