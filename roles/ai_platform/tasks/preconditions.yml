---
# Pre: operators step completed (RHOAI CRDs exist)

- name: Verify DSCI CRD exists
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: dscinitializations.dscinitialization.opendatahub.io
  register: _dsci_crd

- name: Assert DSCI CRD
  ansible.builtin.assert:
    that: _dsci_crd.resources | length > 0
    fail_msg: "DSCI CRD not found. Run the operators step first."

- name: Verify DSC CRD exists
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: datascienceclusters.datasciencecluster.opendatahub.io
  register: _dsc_crd

- name: Assert DSC CRD
  ansible.builtin.assert:
    that: _dsc_crd.resources | length > 0
    fail_msg: "DataScienceCluster CRD not found. Run the operators step first."

- name: Check if DSCI already exists
  kubernetes.core.k8s_info:
    api_version: dscinitialization.opendatahub.io/v1
    kind: DSCInitialization
    name: default-dsci
  register: _pre_dsci

- name: Check if DSC already exists
  kubernetes.core.k8s_info:
    api_version: datasciencecluster.opendatahub.io/v1
    kind: DataScienceCluster
    name: default-dsc
  register: _pre_dsc

- name: Check if KServe controller is ready
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: redhat-ods-applications
    name: kserve-controller-manager
  register: _pre_kserve

- name: Check if model namespace is in service mesh
  kubernetes.core.k8s_info:
    api_version: maistra.io/v1
    kind: ServiceMeshMemberRoll
    namespace: istio-system
    name: default
  register: _pre_smmr
  failed_when: false

- name: Determine if deploy is needed
  ansible.builtin.set_fact:
    _deploy_needed: >-
      {{ not (
        _pre_dsci.resources | length > 0 and
        _pre_dsc.resources | length > 0 and
        (_pre_kserve.resources | length > 0 and
         (_pre_kserve.resources[0].status.readyReplicas | default(0)) >= 1) and
        (_pre_smmr.resources | default([]) | length > 0 and
         model_namespace in (_pre_smmr.resources[0].status.configuredMembers | default([])))
      ) }}

- name: "ai_platform: already complete, skipping deploy."
  ansible.builtin.debug:
    msg: "ai_platform: already complete, skipping deploy."
  when: not (_deploy_needed | bool)

- name: "ai_platform preconditions: PASSED"
  ansible.builtin.debug:
    msg: "RHOAI CRDs present."
  when: _deploy_needed | bool
