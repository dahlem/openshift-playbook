---
# Post: InferenceService is Ready with a URL

- name: Get InferenceService status
  kubernetes.core.k8s_info:
    api_version: serving.kserve.io/v1beta1
    kind: InferenceService
    namespace: "{{ model_namespace }}"
    name: "{{ model_name }}"
  register: _isvc

- name: Assert InferenceService is Ready
  ansible.builtin.assert:
    that: >-
      _isvc.resources | length > 0 and
      _isvc.resources[0].status is defined and
      _isvc.resources[0].status.conditions is defined and
      (_isvc.resources[0].status.conditions
       | selectattr('type', 'equalto', 'Ready')
       | selectattr('status', 'equalto', 'True')
       | list | length > 0)
    fail_msg: "InferenceService {{ model_name }} is not Ready."

- name: Assert InferenceService has a URL
  ansible.builtin.assert:
    that: >-
      _isvc.resources[0].status.url is defined and
      _isvc.resources[0].status.url | length > 0
    fail_msg: "InferenceService {{ model_name }} has no URL."

- name: Find inference route by label
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    namespace: istio-system
    label_selectors:
      - "serving.kserve.io/inferenceservice={{ model_name }}"
  register: _route

- name: Ensure route timeout for long inference requests
  ansible.builtin.command:
    cmd: >-
      oc annotate route {{ _route.resources[0].metadata.name }} -n istio-system
      haproxy.router.openshift.io/timeout={{ route_timeout | default('600s') }}
      --overwrite
  register: _timeout_result
  changed_when: _timeout_result.rc == 0
  when: _route.resources | length > 0

- name: "model postconditions: PASSED"
  ansible.builtin.debug:
    msg:
      - ""
      - "============================================================"
      - "  {{ model_name }} is ready"
      - "============================================================"
      - ""
      - "  Endpoint: {{ _isvc.resources[0].status.url }}"
      - "  Model:    {{ model_name }}"
      - "  GPUs:     {{ gpu_pool_min_replicas | default(1) }}x {{ _gpu_instance_type | default('unknown') }}"
      - ""
      - "  Test:"
      - "    curl -sk {{ _isvc.resources[0].status.url }}/v1/chat/completions \\"
      - "      -H 'Content-Type: application/json' \\"
      - "      -d '{\"model\":\"{{ model_name }}\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}'"
      - ""
      - "============================================================"
      - ""
