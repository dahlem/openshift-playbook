---
- name: Check if pull secret credentials are provided
  ansible.builtin.set_fact:
    _pull_secret_provided: "{{ registry_username is defined and registry_password is defined }}"

- name: Check if pull secret already exists on cluster
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: "{{ model_namespace }}"
    name: redhat-registry
  register: _existing_secret
  failed_when: false
  when: _cluster_exists and _cluster_state == 'ready'

- name: Validate pull secret availability
  ansible.builtin.assert:
    that: >-
      _pull_secret_provided or
      (_existing_secret.resources | default([]) | length > 0)
    fail_msg: |
      No pull secret for registry.redhat.io. Either:
        1. Pass credentials: --extra-vars 'registry_username=... registry_password=...'
        2. Or create manually:
           oc create secret docker-registry redhat-registry \
             --docker-server=registry.redhat.io \
             --docker-username='USERNAME' --docker-password='TOKEN'
           oc secrets link default redhat-registry --for=pull
      Get credentials: https://access.redhat.com/terms-based-registry/
  when: _cluster_exists and _cluster_state == 'ready'
