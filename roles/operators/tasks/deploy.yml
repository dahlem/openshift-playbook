---
- name: Create operator namespaces
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
  loop:
    - openshift-nfd
    - nvidia-gpu-operator
    - openshift-serverless
    - istio-system
    - redhat-ods-operator

- name: Create namespaced operator groups
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: "{{ item.name }}"
        namespace: "{{ item.namespace }}"
      spec: "{{ item.spec }}"
  loop:
    - { name: openshift-nfd, namespace: openshift-nfd, spec: { targetNamespaces: [openshift-nfd] } }
    - { name: nvidia-gpu-operator, namespace: nvidia-gpu-operator, spec: { targetNamespaces: [nvidia-gpu-operator] } }
    - { name: openshift-serverless, namespace: openshift-serverless, spec: {} }
    - { name: redhat-ods-operator, namespace: redhat-ods-operator, spec: {} }
  loop_control:
    label: "{{ item.name }}"

- name: Create operator subscriptions
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: "{{ item.name }}"
        namespace: "{{ item.namespace }}"
      spec:
        channel: "{{ item.channel }}"
        name: "{{ item.package }}"
        source: "{{ item.source }}"
        sourceNamespace: openshift-marketplace
  loop:
    - { name: nfd, namespace: openshift-nfd, package: "{{ versions.operators.nfd.package }}", channel: "{{ versions.operators.nfd.channel }}", source: "{{ versions.operators.nfd.source }}" }
    - { name: gpu-operator-certified, namespace: nvidia-gpu-operator, package: "{{ versions.operators.gpu.package }}", channel: "{{ versions.operators.gpu.channel }}", source: "{{ versions.operators.gpu.source }}" }
    - { name: serverless-operator, namespace: openshift-serverless, package: "{{ versions.operators.serverless.package }}", channel: "{{ versions.operators.serverless.channel }}", source: "{{ versions.operators.serverless.source }}" }
    - { name: servicemeshoperator, namespace: openshift-operators, package: "{{ versions.operators.servicemesh.package }}", channel: "{{ versions.operators.servicemesh.channel }}", source: "{{ versions.operators.servicemesh.source }}" }
    - { name: rhods-operator, namespace: redhat-ods-operator, package: "{{ versions.operators.rhoai.package }}", channel: "{{ versions.operators.rhoai.channel }}", source: "{{ versions.operators.rhoai.source }}" }
  loop_control:
    label: "{{ item.name }}"

- name: Wait for operator CRDs
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: "{{ item.crd }}"
  register: _crd_check
  until: _crd_check.resources | length > 0
  retries: "{{ (crd_wait_timeout | int / 10) | int }}"
  delay: 10
  loop:
    - { crd: "nodefeaturediscoveries.nfd.openshift.io", label: "NFD" }
    - { crd: "clusterpolicies.nvidia.com", label: "GPU Operator" }
    - { crd: "dscinitializations.dscinitialization.opendatahub.io", label: "RHOAI DSCI" }
    - { crd: "datascienceclusters.datasciencecluster.opendatahub.io", label: "RHOAI DSC" }
  loop_control:
    label: "{{ item.label }}"
