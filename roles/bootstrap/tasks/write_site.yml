---
# Write discovered values to site.yml.
# Existing values (from site.yml or extra-vars) take precedence over newly discovered ones.

- name: Assemble final values
  ansible.builtin.set_fact:
    _site_cluster_name: "{{ rosa_cluster_name }}"
    _site_oidc: >-
      {{ _discovered_oidc_config_id | default(rosa_oidc_config_id | default('')) }}
    _site_installer: >-
      {{ _discovered_installer_role | default(rosa_installer_role | default('')) }}
    _site_support: >-
      {{ _discovered_support_role | default(rosa_support_role | default('')) }}
    _site_worker: >-
      {{ _discovered_worker_role | default(rosa_worker_role | default('')) }}
    _site_private: >-
      {{ _discovered_private_subnet | default(rosa_private_subnet | default('')) }}
    _site_public: >-
      {{ _discovered_public_subnet | default(rosa_public_subnet | default('')) }}
    _site_region: "{{ _bootstrap_region }}"

- name: Write site.yml
  ansible.builtin.copy:
    dest: "{{ inventory_dir }}/group_vars/all/site.yml"
    content: |
      ---
      # ============================================================
      # Site-specific config — DO NOT COMMIT
      # ============================================================
      # Generated by: ansible-playbook playbooks/bootstrap.yml
      # Re-run bootstrap to update, or edit manually.

      # Cluster
      rosa_cluster_name: {{ _site_cluster_name }}
      rosa_hosted_cp: true
      rosa_oidc_config_id: {{ _site_oidc | trim }}

      # IAM
      rosa_installer_role: {{ _site_installer | trim }}
      rosa_support_role: {{ _site_support | trim }}
      rosa_worker_role: {{ _site_worker | trim }}

      # Networking
      rosa_private_subnet: {{ _site_private | trim }}
      rosa_public_subnet: {{ _site_public | trim }}
      aws_region: {{ _site_region }}
    mode: "0600"

- name: "bootstrap: site.yml written"
  ansible.builtin.debug:
    msg: "Configuration saved to {{ inventory_dir }}/group_vars/all/site.yml"
