---
- name: Create NFD instance
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: nfd.openshift.io/v1
      kind: NodeFeatureDiscovery
      metadata:
        name: nfd-instance
        namespace: openshift-nfd
      spec:
        operand: {}

- name: Create GPU ClusterPolicy
  kubernetes.core.k8s:
    state: present
    src: "{{ role_path }}/templates/clusterpolicy.yml"

- name: Wait for GPU node readiness
  when: _expect_nodes | bool
  block:
    # NVIDIA GPUs appear as PCI class 0300 (VGA) or 0302 (3D controller)
    # depending on instance type. Check for either label.
    - name: Wait for NFD to label GPU node
      ansible.builtin.command:
        cmd: >-
          oc get nodes
          -l 'node.kubernetes.io/instance-type={{ _gpu_instance_type }}'
          -o jsonpath='{range .items[*]}{.metadata.name}{" "}{end}'
      register: _nfd_labelled
      changed_when: false
      until: _nfd_labelled.stdout | trim | length > 0
      retries: "{{ (crd_wait_timeout | int / 10) | int }}"
      delay: 10

    - name: Check for NVIDIA PCI label on GPU nodes
      ansible.builtin.shell:
        cmd: >-
          oc get node {{ _nfd_labelled.stdout.split()[0] }}
          -o jsonpath='{.metadata.labels}' |
          python3 -c "import json,sys; labels=json.load(sys.stdin);
          print('true' if any('10de' in k for k in labels) else 'false')"
      register: _nfd_pci_check
      changed_when: false
      until: _nfd_pci_check.stdout | trim == 'true'
      retries: "{{ (crd_wait_timeout | int / 10) | int }}"
      delay: 10

    - name: Wait for GPU operator to register nvidia.com/gpu
      kubernetes.core.k8s_info:
        kind: Node
        label_selectors:
          - "nvidia.com/gpu.present=true"
      register: _gpu_labelled
      until: _gpu_labelled.resources | length > 0
      retries: "{{ (crd_wait_timeout | int / 10) | int }}"
      delay: 10

    - name: Wait for GPU to be allocatable
      ansible.builtin.command:
        cmd: >-
          oc get node {{ _gpu_labelled.resources[0].metadata.name }}
          -o jsonpath='{.status.allocatable.nvidia\.com/gpu}'
      register: _gpu_allocatable
      changed_when: false
      until: _gpu_allocatable.stdout | int > 0
      retries: 30
      delay: 10

- name: "gpu_stack: NFD + ClusterPolicy created (nodes will be labelled on scale-up)"
  ansible.builtin.debug:
    msg: >-
      GPU stack configured. No GPU nodes running (autoscaling min=0).
      NFD and GPU operator will label nodes automatically when they scale up.
  when: not (_expect_nodes | bool)
