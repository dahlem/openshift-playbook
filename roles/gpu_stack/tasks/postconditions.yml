---
# Post: NFD labelled GPU node, nvidia.com/gpu is allocatable
# With autoscaling min=0: only verify ClusterPolicy exists (no nodes to check)

- name: Verify GPU node labelling
  when: _expect_nodes | bool
  block:
    # NVIDIA GPUs appear as PCI class 0300 (VGA) or 0302 (3D controller).
    # Match any node with an NFD label containing vendor 10de.
    - name: Wait for NFD to label GPU node
      ansible.builtin.shell:
        cmd: >-
          oc get nodes -l 'node.kubernetes.io/instance-type={{ _gpu_instance_type }}'
          -o json |
          python3 -c "import json,sys; data=json.load(sys.stdin);
          nodes=[n['metadata']['name'] for n in data.get('items',[])
                 if any('10de' in k for k in n.get('metadata',{}).get('labels',{}))];
          print(' '.join(nodes) if nodes else '')"
      register: _nfd_nodes_raw
      changed_when: false
      until: _nfd_nodes_raw.stdout | trim | length > 0
      retries: 40
      delay: 15

    - name: Get NFD-labelled GPU node details
      kubernetes.core.k8s_info:
        kind: Node
        name: "{{ _nfd_nodes_raw.stdout.split()[0] }}"
      register: _nfd_nodes

    - name: Wait for nvidia.com/gpu to become allocatable
      ansible.builtin.command:
        cmd: >-
          oc get node {{ _nfd_nodes.resources[0].metadata.name }}
          -o jsonpath='{.status.allocatable.nvidia\.com/gpu}'
      register: _gpu_count
      changed_when: false
      until: (_gpu_count.stdout | default('0') | int) > 0
      retries: 40
      delay: 15

- name: Wait for ClusterPolicy to become ready
  kubernetes.core.k8s_info:
    api_version: nvidia.com/v1
    kind: ClusterPolicy
    name: gpu-cluster-policy
  register: _cp
  until: >-
    _cp.resources | length > 0 and
    (_cp.resources[0].status.state | default('')) == 'ready'
  retries: 40
  delay: 15
  when: _expect_nodes | bool

- name: Assert ClusterPolicy exists
  ansible.builtin.assert:
    that: _cp.resources | length > 0
    fail_msg: "ClusterPolicy not found."
  when: not (_expect_nodes | bool)

- name: "gpu_stack postconditions: PASSED (nodes running)"
  ansible.builtin.debug:
    msg: >-
      GPU stack operational: {{ _gpu_count.stdout }} GPU(s) allocatable
      on {{ _nfd_nodes.resources[0].metadata.name }}, ClusterPolicy ready.
  when: _expect_nodes | bool

- name: "gpu_stack postconditions: PASSED (autoscaling idle)"
  ansible.builtin.debug:
    msg: >-
      GPU stack configured: NFD instance + ClusterPolicy created.
      GPUs will become allocatable when nodes scale up.
  when: not (_expect_nodes | bool)
